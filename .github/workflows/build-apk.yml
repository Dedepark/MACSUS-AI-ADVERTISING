name: Build & Publish APK

on:
  push:
    branches:
      - main # Akan jalan otomatis setiap kamu push ke branch main
  workflow_dispatch: # Memunculkan tombol "Run workflow" manual di GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Fix Capacitor Permissions
        run: chmod +x node_modules/.bin/cap

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK Debug
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk macsus-ai.apk

      - name: Upload Release to GitHub
        uses: ncipollo/release-action@v1
        with:
          artifacts: "macsus-ai.apk"
          tag: "latest"
          name: "Macsus AI Latest APK"
          body: "Auto-generated APK build dari GitHub Actions."
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}